name: 'Blast Radius - AWS Infrastructure Risk Analysis'
description: 'Analyze AWS infrastructure changes (CDK, CloudFormation, Terraform) for blast radius risk before deployment.'
author: 'sburgholzer'

branding:
  icon: 'target'
  color: 'orange'

inputs:
  format:
    description: 'Input format: cloudformation, terraform-plan, canonical'
    required: true
  input:
    description: 'Path to the input file (changeset JSON, terraform plan JSON, or canonical manifest)'
    required: true
  threshold:
    description: 'Risk score threshold (0-100). Fails if any resource exceeds this.'
    required: false
  ai-gate:
    description: 'Fail if AI recommends against deployment (true/false)'
    required: false
    default: 'false'
  no-summary:
    description: 'Skip AI summary generation (true/false)'
    required: false
    default: 'false'
  api-url:
    description: 'Blast Radius API URL'
    required: true
  comment-pr:
    description: 'Automatically comment results on the PR (true/false)'
    required: false
    default: 'true'
  version:
    description: 'CLI version to use (default: latest)'
    required: false
    default: 'latest'

outputs:
  analysis-id:
    description: 'The analysis ID'
    value: ${{ steps.run.outputs.analysis-id }}
  verdict:
    description: 'pass or fail'
    value: ${{ steps.run.outputs.verdict }}
  highest-score:
    description: 'Highest impact score'
    value: ${{ steps.run.outputs.highest-score }}
  total-affected:
    description: 'Total affected resources'
    value: ${{ steps.run.outputs.total-affected }}
  recommend-deploy:
    description: 'AI deployment recommendation (true/false)'
    value: ${{ steps.run.outputs.recommend-deploy }}
  confidence:
    description: 'AI recommendation confidence (high/medium/low)'
    value: ${{ steps.run.outputs.confidence }}
  summary:
    description: 'AI-generated risk summary (markdown)'
    value: ${{ steps.run.outputs.summary }}
  result-json:
    description: 'Full JSON result'
    value: ${{ steps.run.outputs.result-json }}

runs:
  using: 'composite'
  steps:
    - name: Download Blast Radius CLI
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          URL="https://github.com/sburgholzer/BlastRadius/releases/latest/download/blast-radius.js"
        else
          URL="https://github.com/sburgholzer/BlastRadius/releases/download/${VERSION}/blast-radius.js"
        fi
        curl -sL "$URL" -o ${{ runner.temp }}/blast-radius.js
        # Strip shebang (node can't parse it when invoked with node <file>)
        sed -i '1{/^#!/d}' ${{ runner.temp }}/blast-radius.js

    - name: Run Blast Radius Analysis
      id: run
      shell: bash
      env:
        BLAST_RADIUS_API_URL: ${{ inputs.api-url }}
      run: |
        # Build command arguments
        ARGS="analyze --format ${{ inputs.format }} --input ${{ inputs.input }} --ci"

        if [ -n "${{ inputs.threshold }}" ]; then
          ARGS="$ARGS --threshold ${{ inputs.threshold }}"
        fi
        if [ "${{ inputs.ai-gate }}" = "true" ]; then
          ARGS="$ARGS --ai-gate"
        fi
        if [ "${{ inputs.no-summary }}" = "true" ]; then
          ARGS="$ARGS --no-summary"
        fi

        # Run the CLI
        set +e
        RESULT=$(node ${{ runner.temp }}/blast-radius.js $ARGS)
        EXIT_CODE=$?
        set -e

        # Save full result
        echo "$RESULT" > ${{ runner.temp }}/blast-radius-result.json

        # Parse outputs
        echo "result-json=$RESULT" >> $GITHUB_OUTPUT
        echo "analysis-id=$(echo "$RESULT" | jq -r '.analysisId // empty')" >> $GITHUB_OUTPUT
        echo "verdict=$(echo "$RESULT" | jq -r '.verdict // empty')" >> $GITHUB_OUTPUT
        echo "highest-score=$(echo "$RESULT" | jq -r '.riskSummary.highestScore // empty')" >> $GITHUB_OUTPUT
        echo "total-affected=$(echo "$RESULT" | jq -r '.riskSummary.totalAffected // empty')" >> $GITHUB_OUTPUT
        echo "recommend-deploy=$(echo "$RESULT" | jq -r '.recommendDeploy // empty')" >> $GITHUB_OUTPUT
        echo "confidence=$(echo "$RESULT" | jq -r '.confidence // empty')" >> $GITHUB_OUTPUT

        # Multi-line summary output
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "summary<<$EOF" >> $GITHUB_OUTPUT
        echo "$RESULT" | jq -r '.naturalLanguageSummary // empty' >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

        # Exit with the CLI's exit code
        exit $EXIT_CODE

    - name: Comment PR with Results
      if: ${{ inputs.comment-pr == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERDICT=$(echo '${{ steps.run.outputs.result-json }}' | jq -r '.verdict // "unknown"')
        SCORE=$(echo '${{ steps.run.outputs.result-json }}' | jq -r '.riskSummary.highestScore // "N/A"')
        AFFECTED=$(echo '${{ steps.run.outputs.result-json }}' | jq -r '.riskSummary.totalAffected // "N/A"')
        DEPLOY=$(echo '${{ steps.run.outputs.result-json }}' | jq -r '.recommendDeploy // "N/A"')
        CONFIDENCE=$(echo '${{ steps.run.outputs.result-json }}' | jq -r '.confidence // "N/A"')
        SUMMARY=$(echo '${{ steps.run.outputs.result-json }}' | jq -r '.naturalLanguageSummary // ""')

        if [ "$VERDICT" = "pass" ]; then
          ICON="✅ PASS"
        else
          ICON="❌ FAIL"
        fi

        if [ "$DEPLOY" = "true" ]; then
          DEPLOY_TEXT="✅ Deploy"
        elif [ "$DEPLOY" = "false" ]; then
          DEPLOY_TEXT="❌ Do Not Deploy"
        else
          DEPLOY_TEXT="N/A"
        fi

        BODY="## 🎯 Blast Radius Analysis — ${ICON}

        | Metric | Value |
        |--------|-------|
        | Highest Score | ${SCORE}/100 |
        | Affected Resources | ${AFFECTED} |
        | AI Recommendation | ${DEPLOY_TEXT} |
        | Confidence | ${CONFIDENCE} |

        ---

        ${SUMMARY:-*No AI summary available.*}"

        # Remove leading whitespace from heredoc-style
        BODY=$(echo "$BODY" | sed 's/^        //')

        gh pr comment ${{ github.event.pull_request.number }} --body "$BODY" --repo ${{ github.repository }}
